    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .nav-back {

    .nav-back:hover { color: var(--text); }

    .hero { padding: 6rem 2.5rem 4rem; max-width: 1200px; margin: 0 auto; }
    .hero-eyebrow {

    .hero-sub { margin-top: 1.5rem; color: var(--muted); font-size: 1rem; font-weight: 300; max-width: 420px; }

      max-width: 1200px; margin: 0 auto 2rem; padding: 0 2.5rem;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px; background: var(--border); border: 1px solid var(--border);
    }

    /* ── CARD ── */
    .card {
      background: var(--bg); display: flex; flex-direction: column;
      overflow: hidden; position: relative; transition: background 0.25s; cursor: pointer;
    }

      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94); display: block;

    .about-closing p {
      font-size: 1rem; font-weight: 300; color: var(--muted);
      line-height: 1.8; max-width: 560px;
    }
    .about-cta-stack { display: flex; flex-direction: column; gap: 0.6rem; flex-shrink: 0; }
    .cta-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.7rem 1.4rem; text-decoration: none; font-size: 0.82rem;
      font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
      transition: background 0.2s, color 0.2s; white-space: nowrap;
    }
    .cta-btn-primary { background: var(--accent); color: #0d0d0d; }
    .cta-btn-primary:hover { background: #f5ff6e; }
    .cta-btn-secondary { border: 1px solid var(--border); color: var(--text); }
    .cta-btn-secondary:hover { border-color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .detail-body { grid-template-columns: 1fr; gap: 2rem; }
      .detail-right { position: static; }
      .about-page-body { grid-template-columns: 1fr; gap: 2.5rem; }
      .about-closing { flex-direction: column; }
      .about-page-hero { grid-template-columns: 1fr; }
      .about-photo, .about-photo-placeholder { width: 120px; height: 120px; }
    }
    @media (max-width: 700px) {
      nav { padding: 0 1.2rem; }
      .nav-links { gap: 1rem; }
      .hero { padding: 4rem 1.2rem 2rem; }
      .section-header { padding: 0 1.2rem; }
      .grid { padding: 0 1.2rem; grid-template-columns: 1fr; }
      .about-strip { padding: 2rem 1.2rem; flex-direction: column; gap: 2rem; }
      footer { padding: 1.2rem; flex-direction: column; gap: 0.5rem; }
      #detail-view, #about-view { padding: 0 1.2rem 4rem; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .hero { animation: fadeUp 0.55s ease both; }
    .grid .card { animation: fadeUp 0.55s ease both; }
    .grid .card:nth-child(1) { animation-delay: 0.05s; }
    .grid .card:nth-child(2) { animation-delay: 0.12s; }
    .grid .card:nth-child(3) { animation-delay: 0.19s; }
    .grid .card:nth-child(4) { animation-delay: 0.26s; }
    .grid .card:nth-child(5) { animation-delay: 0.33s; }
    .grid .card:nth-child(6) { animation-delay: 0.40s; }
    .grid .card:nth-child(7) { animation-delay: 0.47s; }
    .grid .card:nth-child(8) { animation-delay: 0.54s; }
    #detail-view:not(.hidden), #about-view:not(.hidden) { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="nav-logo" id="nav-logo"></span>
  <ul class="nav-links" id="nav-home-links">
    <li><a id="nav-work"  onclick="showHome()">Work</a></li>
    <li><a id="nav-about" onclick="showAbout()">About</a></li>
  </ul>
  <a class="nav-back" id="nav-back" onclick="showHome()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to work
  </a>
</nav>

<!-- ═══════════ HOME VIEW ═══════════ -->
<div id="home-view">
  <section class="hero">
    <span class="hero-eyebrow" id="hero-tagline"></span>
    <h1 id="hero-h1"></h1>
    <p class="hero-sub" id="hero-copy"></p>
  </section>

  <div class="section-header">
    <h2>Selected Work</h2>
    <div class="section-line"></div>
  </div>

  <div class="grid" id="game-grid"></div>

  <div class="about-strip">
    <div class="about-left">
      <h3>About Me</h3>
      <p id="home-about-copy"></p>
    </div>
    <div class="about-right" id="home-contact-links"></div>
  </div>

  <footer>
    <span id="footer-name"></span>
    <span>Built with ♥ and too much coffee</span>
  </footer>
</div>

<!-- ═══════════ DETAIL VIEW ═══════════ -->
<div id="detail-view" class="hidden">
  <div class="detail-hero">
    <div class="detail-type-row">
      <span class="detail-type" id="d-type"></span>
      <span class="detail-year" id="d-year"></span>
    </div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-role"  id="d-role"></div>
    <div class="detail-tags"  id="d-tags"></div>
  </div>
  <div class="detail-body">
    <div class="detail-left">
      <div class="detail-section">
        <div class="detail-section-label">About the Game</div>
        <p id="d-description"></p>
      </div>
      <div class="detail-section">
        <div class="detail-section-label">My Contribution</div>
        <p id="d-contribution"></p>
      </div>
      <div class="detail-section">
        <div class="detail-section-label">Design Process</div>
        <p id="d-process"></p>
      </div>
    </div>
    <div class="detail-right" id="d-media"></div>
  </div>
</div>

<!-- ═══════════ ABOUT VIEW ═══════════ -->
<div id="about-view" class="hidden">

  <div class="about-page-hero">
    <div class="about-page-hero-text">
      <span class="about-page-eyebrow" id="a-tagline"></span>
      <div class="about-page-headline" id="a-headline"></div>
      <p class="about-page-bio" id="a-bio"></p>
    </div>
    <div id="a-photo-wrap"></div>
  </div>

  <div class="about-page-body" id="about-page-body">

    <!-- Left col: Education + Skills injected by JS -->
    <div class="about-page-col" id="about-col-left"></div>

    <!-- Right col: Skills injected by JS -->
    <div class="about-page-col" id="about-col-right"></div>

    <!-- Full-width closing -->
    <div class="about-closing">
      <p id="a-closing"></p>
      <div class="about-cta-stack" id="a-cta"></div>
    </div>

  </div>
</div>

<!-- ═══════════ SCRIPT ═══════════ -->
<script>

/* ── Populate site meta ─────────────────────────────── */
document.getElementById('nav-logo').textContent = SITE.name;
document.getElementById('hero-tagline').textContent = SITE.tagline;
document.getElementById('hero-h1').innerHTML = SITE.heroLine1 + '<br><span>' + SITE.heroLine2 + '</span>';
document.getElementById('hero-copy').textContent = SITE.heroCopy;
document.getElementById('home-about-copy').textContent = ABOUT.bio;
document.getElementById('footer-name').textContent = '© ' + new Date().getFullYear() + ' ' + SITE.name;

/* Home contact links */
const homeCL = document.getElementById('home-contact-links');
[
  { icon:'✉', label: SITE.email,     href:'mailto:'+SITE.email },
  { icon:'🔗', label:'itch.io',      href: SITE.itchio  },
  { icon:'🐙', label:'GitHub',       href: SITE.github  },
  { icon:'💼', label:'LinkedIn',     href: SITE.linkedin},
  { icon:'📄', label:'Resume / CV',  href: SITE.resume  }
].forEach(c => {
  homeCL.innerHTML += `<a class="contact-link" href="${c.href}" target="_blank">
    <span class="icon">${c.icon}</span>${c.label}</a>`;
});

/* ── Build grid ──────────────────────────────────────── */
const grid = document.getElementById('game-grid');
GAMES.forEach(g => {
  const firstImg = g.media.find(m => m.type==='image' || m.type==='gif');
  const thumb = g.thumbnail || (firstImg && firstImg.src ? firstImg.src : '');
  const hasThumb = thumb.trim() !== '';
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => showDetail(g.id);
  card.innerHTML = `
    <div class="card-img ${hasThumb ? '' : g.thumbColor}">
      ${hasThumb ? `<img src="${thumb}" alt="${g.title}">` : `<div class="placeholder-label">Screenshot</div>`}
      ${g.wip ? '<div class="wip-badge">In Progress</div>' : ''}
    </div>
    <div class="card-body">
      <span class="card-role">${g.role}</span>
      <div class="card-title">${g.title}</div>
      <p class="card-desc">${g.description.split('.')[0]}.</p>
      <div class="card-meta">
        <div class="card-tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div style="display:flex;align-items:center;gap:.6rem">
          <span class="card-year">${g.year}</span>
          <span class="card-arrow">↗</span>
        </div>
      </div>
    </div>`;
  grid.appendChild(card);
});

/* ── Build About page ───────────────────────────────── */
document.getElementById('a-tagline').textContent  = SITE.tagline;
document.getElementById('a-headline').textContent = ABOUT.headline;
document.getElementById('a-bio').textContent      = ABOUT.bio;
document.getElementById('a-closing').textContent  = ABOUT.closing;

/* Photo */
const photoWrap = document.getElementById('a-photo-wrap');
if (ABOUT.photo && ABOUT.photo.trim() !== '') {
  photoWrap.innerHTML = `<img class="about-photo" src="${ABOUT.photo}" alt="${SITE.name}">`;
} else {
  photoWrap.innerHTML = `<div class="about-photo-placeholder">PHOTO</div>`;
}

/* Education → left col */
const colLeft = document.getElementById('about-col-left');
let eduHTML = `<div><div class="about-section-label">Education</div>`;
ABOUT.education.forEach(e => {
  eduHTML += `<div class="edu-entry">
    <div class="edu-degree">${e.degree}</div>
    <div class="edu-meta">
      <span class="edu-school">${e.school}</span>
      <span class="edu-year">${e.year}</span>
    </div>
    ${e.notes ? `<p class="edu-notes">${e.notes}</p>` : ''}
  </div>`;
});
eduHTML += `</div>`;
colLeft.innerHTML = eduHTML;

/* Skills → right col */
const colRight = document.getElementById('about-col-right');
let skillHTML = `<div><div class="about-section-label">Skills & Tools</div>`;
ABOUT.skills.forEach(group => {
  skillHTML += `<div class="skill-group">
    <div class="skill-category">${group.category}</div>
    <div class="skill-pills">${group.items.map(i=>`<span class="skill-pill">${i}</span>`).join('')}</div>
  </div>`;
});
skillHTML += `</div>`;
colRight.innerHTML = skillHTML;

/* CTA buttons */
document.getElementById('a-cta').innerHTML = `
  <a class="cta-btn cta-btn-primary" href="${SITE.resume}" target="_blank">📄 Download Resume</a>
  <a class="cta-btn cta-btn-secondary" href="mailto:${SITE.email}">✉ Get in touch</a>`;

/* ── Navigation ────────────────────────────────────── */
function setView(view) {
  document.getElementById('home-view').classList.toggle('hidden',   view !== 'home');
  document.getElementById('detail-view').classList.toggle('hidden', view !== 'detail');
  document.getElementById('about-view').classList.toggle('hidden',  view !== 'about');
  // nav back vs normal links
  const showBack = view === 'detail';
  document.getElementById('nav-home-links').classList.toggle('hidden', showBack);
  document.getElementById('nav-back').style.display = showBack ? 'flex' : 'none';
  // active state
  document.getElementById('nav-work').classList.toggle('active',  view === 'home');
  document.getElementById('nav-about').classList.toggle('active', view === 'about');
}

function showHome() {
  setView('home');
  window.scrollTo({ top:0, behavior:'smooth' });
  history.pushState('', document.title, window.location.pathname);
}

function showAbout() {
  setView('about');
  window.scrollTo({ top:0 });
  history.pushState(null, '', '#about');
}

function showDetail(id) {
  const g = GAMES.find(x => x.id === id);
  if (!g) return;

  document.getElementById('d-type').textContent         = g.projectType;
  document.getElementById('d-year').textContent         = g.year;
  document.getElementById('d-title').textContent        = g.title;
  document.getElementById('d-role').textContent         = g.role;
  document.getElementById('d-description').textContent  = g.description;
  document.getElementById('d-contribution').textContent = g.contribution;
  document.getElementById('d-process').textContent      = g.designProcess;
  document.getElementById('d-tags').innerHTML           = g.tags.map(t=>`<span class="tag">${t}</span>`).join('');

  const mediaEl = document.getElementById('d-media');
  mediaEl.innerHTML = '';
  g.media.forEach(m => {
    if (m.type === 'youtube') {
      mediaEl.innerHTML += `<div class="media-item">
        <iframe src="https://www.youtube.com/embed/${m.id}" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>`;
    } else if (m.type === 'image' || m.type === 'gif') {
      const hasSrc = m.src && m.src.trim() !== '';
      mediaEl.innerHTML += `<div class="media-item">
        ${hasSrc ? `<img src="${m.src}" alt="${m.caption||''}" loading="lazy">` : `<div class="media-placeholder">${m.type.toUpperCase()}</div>`}
        ${m.caption ? `<div class="media-caption">${m.caption}</div>` : ''}
      </div>`;
    } else if (m.type === 'link') {
      mediaEl.innerHTML += `<a class="media-link" href="${m.url}" target="_blank">${m.label}<span>↗</span></a>`;
    }
  });

  setView('detail');
  window.scrollTo({ top:0 });
  history.pushState(null, '', '#' + id);
}

/* ── Handle hash on load / back/forward ─────────────── */
function handleHash() {
  const hash = window.location.hash.replace('#','');
  if (hash === 'about') { showAbout(); return; }
  if (hash && GAMES.find(g => g.id === hash)) { showDetail(hash); return; }
  setView('home');
}
window.addEventListener('popstate', handleHash);
handleHash();
</script>
</body>
</html>
